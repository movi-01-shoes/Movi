<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOVI — Integrated System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Bebas+Neue&family=Inter&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #fff; }
        /* Visibility Controller */
        #storefront-view { display: none; }
        #admin-view { display: none; }
        
        /* Loading State */
        .loading { padding: 50px; text-align: center; font-family: monospace; }
        
        /* CSS from your previous file goes here (Keep your previous styles) */
        /* Note: Make sure all the CSS you provided in the last prompt is included below this line */
    </style>
</head>
<body>

    <div id="storefront-view">
        <header>
            <div class="brand-box" onclick="setView('home')"><span class="brand-name">MOVI</span></div>
            <div id="live-clock">00:00:00</div>
        </header>
        <div id="view-home" class="page-view active">
            <div id="lookbook-strip"></div>
        </div>
        <div id="view-shop" class="page-view">
            <div id="catalog-grid"></div>
        </div>
        </div>

    <div id="admin-view">
        <div id="admin-login-screen">
            <div class="login-box">
                <div class="login-brand">MOVI</div>
                <input type="password" id="gate-pass" class="admin-input-field" placeholder="Admin Password">
                <button class="login-btn" onclick="verifyAdminAuthorization()">LOGIN</button>
            </div>
        </div>
        </div>

    <script>
        // CONFIGURATION
        const SUPABASE_URL = 'https://mbrkeowkfexhyeycegny.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Replace with your real Key
        const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/dv0knnmga/image/upload';
        const CLOUDINARY_PRESET = 'movi-shoes';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ROUTING SYSTEM
        async function bootSystemContext() {
            const hash = window.location.hash;
            const storefront = document.getElementById('storefront-view');
            const admin = document.getElementById('admin-view');

            if (hash === '#admin') {
                storefront.style.display = 'none';
                admin.style.display = 'block';
            } else {
                storefront.style.display = 'block';
                admin.style.display = 'none';
                await syncStorefrontProducts();
            }
        }

        // INIT
        window.addEventListener('hashchange', bootSystemContext);
        window.addEventListener('DOMContentLoaded', bootSystemContext);

        // SYNC DATA
        async function syncStorefrontProducts() {
            const { data, error } = await supabase.from('products').select('*');
            if(data) {
                databaseCacheProducts = data;
                renderStorefrontLayouts(); // Apnar main logic function
            }
        }

        // ADMIN ACCESS
        function verifyAdminAuthorization() {
            const pass = document.getElementById('gate-pass').value;
            if(pass === 'admin') {
                document.getElementById('admin-login-screen').style.display = 'none';
                fireAdminSuiteInitializations(); // Apnar admin initialization
            } else alert('Access Denied');
        }
        
        function bypassToStorefront() { window.location.hash = ''; }
    </script>
</body>
</html>
