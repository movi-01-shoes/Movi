<!DOCTYPE html>

</head>

  <div id="root"></div>

  <!-- The main React application script -->
  <script type="text/babel" data-type="module">

    // --- MOCK DATA ---
    const NEW_ARRIVALS = [

      { id: 2, name: "MOVI KT 10", category: "Basketball Shoes", colors: "6 Colors", price: "$104.00", originalPrice: "$130.00", discount: "20%", rating: "4.6", reviews: 106, image: "https://images.unsplash.com/photo-1608231387042-66d1773070a5?q=80&w=800&auto=format&fit=crop" },
      { id: 3, name: "Men's MOVI KAI 1 'Yin'", category: "Basketball Shoes", colors: "1 Color", price: "$125.00", rating: "4.7", reviews: 110, image: "https://images.unsplash.com/photo-1551107696-a4b0c5a0d9a2?q=80&w=800&auto=format&fit=crop" },
      { id: 4, name: "MOVI KAI 2 TEAM", category: "Basketball Shoes", colors: "6 Colors", price: "$100.00", rating: "5.0", reviews: 3, image: "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?q=80&w=800&auto=format&fit=crop" },
    ];

    const RUNNING_SHOES = [
      { id: 101, name: "Men's MOVI C202 T", category: "Running Shoes", colors: "5 Colors", price: "$150.00", rating: "4.7", reviews: 29, image: "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?q=80&w=800&auto=format&fit=crop" },
      { id: 102, name: "Men's MOVI C202 6", category: "Running Shoes", colors: "5 Colors", price: "$91.00", originalPrice: "$130.00", discount: "30%", rating: "4.0", reviews: 55, image: "https://images.unsplash.com/photo-1608231387042-66d1773070a5?q=80&w=800&auto=format&fit=crop" },

    ];

    const fadeUpVariant = {
      hidden: { opacity: 0, y: 40 },
      visible: { opacity: 1, y: 0, transition: { duration: 0.8, ease: [0.16, 1, 0.3, 1] } }
    };

    const staggerContainer = {
      hidden: { opacity: 0 },
      visible: {
        opacity: 1,
        transition: { staggerChildren: 0.1 }
      }
    };

    // --- COMPONENTS ---
    const AnnouncementBar = () => (
      <div className="bg-black text-white text-xs font-medium py-2 px-4 text-center tracking-widest uppercase relative z-50">

      </div>
    );

    const Navbar = () => {
      const [isScrolled, setIsScrolled] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

      useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      return (
        <React.Fragment>

            initial={{ y: -100 }}
            animate={{ y: 0 }}
            transition={{ duration: 0.6, ease: "easeOut" }}

              isScrolled ? 'bg-white/95 backdrop-blur-md shadow-sm py-4' : 'bg-transparent py-6'

            <div className="max-w-[1400px] mx-auto px-6 flex justify-between items-center">

              <div className="flex items-center gap-4">

            </div>

              </motion.div>
            </motion.div>
          </div>
        </div>
      );

    const BentoGrid = () => {

                    <p className="text-zinc-400 text-sm mb-6">Redefining athletic performance for the modern era.</p>
                    <button className="text-white border-b border-white pb-1 font-bold uppercase text-sm hover:text-zinc-300 transition-colors">Discover Our Story</button>

                 {/* Decorative graphic */}

              </motion.div>
            </div>
          </div>
        </section>
      );
    };

    const ProductCard = ({ product }) => {
      return (
        <motion.div 
          className="flex-none w-[280px] md:w-[310px] group cursor-pointer"
          whileHover={{ y: -5 }}
          transition={{ duration: 0.2 }}
        >
          <div className="relative aspect-square bg-[#f4f4f4] overflow-hidden mb-3">
            <img 
              src={product.image} 
              alt={product.name} 
              className="w-full h-full object-cover mix-blend-multiply group-hover:scale-105 transition-transform duration-500"

            {product.discount && (

                key={product.id}
